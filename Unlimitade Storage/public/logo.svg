<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#f0f4f8"/>

  <!-- Tree trunk -->
  <rect x="45" y="55" width="10" height="20" rx="2" fill="#8B6914"/>
  <rect x="42" y="72" width="16" height="4" rx="2" fill="#6B4F12"/>

  <!-- Tree canopy layers -->
  <!-- Bottom layer (largest) -->
  <ellipse cx="50" cy="48" rx="28" ry="16" fill="#2D8B46"/>

  <!-- Middle layer -->
  <ellipse cx="50" cy="38" rx="22" ry="14" fill="#34A853"/>

  <!-- Top layer -->
  <ellipse cx="50" cy="28" rx="16" ry="12" fill="#43C466"/>

  <!-- Top small -->
  <ellipse cx="50" cy="20" rx="10" ry="8" fill="#56D37A"/>

  <!-- Leaf details -->
  <ellipse cx="35" cy="44" rx="8" ry="5" fill="#2D8B46" transform="rotate(-20 35 44)"/>
  <ellipse cx="65" cy="44" rx="8" ry="5" fill="#2D8B46" transform="rotate(20 65 44)"/>
  <ellipse cx="38" cy="32" rx="6" ry="4" fill="#3DB85A" transform="rotate(-15 38 32)"/>
  <ellipse cx="62" cy="32" rx="6" ry="4" fill="#3DB85A" transform="rotate(15 62 32)"/>

  <!-- Highlights -->
  <ellipse cx="44" cy="24" rx="5" ry="4" fill="#6AE08B" opacity="0.6"/>
  <ellipse cx="42" cy="36" rx="6" ry="4" fill="#5AD47A" opacity="0.4"/>
</svg>